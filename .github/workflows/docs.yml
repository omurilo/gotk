name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  # Also rebuild docs on every release so version badges stay current.
  release:
    types: [published]
  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-progress runs on the same branch.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gotk
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build gotk (needed to satisfy go.mod)
        run: go build ./...

      - name: Install godoku
        run: go install github.com/omurilo/godoku/cmd/godoku@latest

      - name: Build static site
        working-directory: docs
        run: godoku build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
