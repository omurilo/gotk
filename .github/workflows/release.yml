name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Releases and upload assets
  packages: write   # publish to GHCR (optional, unused here)

jobs:
  # Run tests before releasing — block release on any failure.
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race -timeout 120s ./...

  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser needs the full git history to generate the changelog.
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Smoke-test the released binaries by downloading and running them.
  smoke:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [release]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: gotk_*_linux_amd64.tar.gz
          - os: macos-latest
            asset: gotk_*_darwin_arm64.tar.gz
          - os: windows-latest
            asset: gotk_*_windows_amd64.zip

    steps:
      - name: Download release asset
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: ${{ matrix.asset }}

      - name: Extract (Unix)
        if: runner.os != 'Windows'
        run: tar -xzf "${{ matrix.asset }}"

      - name: Extract (Windows)
        if: runner.os == 'Windows'
        run: Expand-Archive -Path "${{ matrix.asset }}" -DestinationPath .
        shell: pwsh

      - name: Version check (Unix)
        if: runner.os != 'Windows'
        run: ./gotk --version

      - name: Version check (Windows)
        if: runner.os == 'Windows'
        run: .\gotk.exe --version
        shell: pwsh

      - name: Functional smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "exit 0" | ./gotk hook --agent claude || true
          ./gotk rewrite "git status"; echo "rewrite exit: $?"

      - name: Functional smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "" | .\gotk.exe hook --agent claude
          .\gotk.exe rewrite "git status"
